services:
  api:
    build:
      context: ./apps/api
    environment:
      APP_ENVIRONMENT: production
      APP_DATABASE_URL: sqlite:////data/lysergic.db
      APP_CORS_ORIGINS: "http://localhost:3000,http://web:3000"
      APP_LOG_LEVEL: INFO
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_MODEL: ${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-8b-instruct}
      FIREWORKS_TIMEOUT: ${FIREWORKS_TIMEOUT:-30}
    ports:
      - "8000:8000"
    volumes:
      - api-data:/data
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-data:
